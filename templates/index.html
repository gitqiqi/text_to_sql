<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自然语言转SQL查询系统</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Arial', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 主标题 */
        .main-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-header h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .main-header p {
            color: rgba(255,255,255,0.9);
            font-size: 1rem;
        }

        /* 数据库选择器 */
        .database-selector {
            background: white;
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .database-selector label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .database-selector select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .database-selector select:focus {
            outline: none;
            border-color: #667eea;
        }

        .database-description {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }

        .kb-status {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px 16px;
            margin-top: 12px;
            font-size: 13px;
            color: #555;
            border-left: 4px solid #667eea;
        }

        /* 主内容区域 - 使用 flex 布局支持侧边栏 */
        .main-content {
            display: flex;
            gap: 0;
            position: relative;
            min-height: 600px;
        }

        /* 左侧主体内容 */
        .content-main {
            flex: 1;
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            margin-right: 0;
        }

        /* 右侧 AI SQL 侧边栏 - 像 list 一样 */
        .ai-sidebar {
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            width: 0;
            background: white;
            box-shadow: -4px 0 20px rgba(0,0,0,0.1);
            transition: width 0.3s ease;
            z-index: 1000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .ai-sidebar.open {
            width: 480px;
        }

        /* 侧边栏头部 */
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 2px solid #f0f0f0;
            background: white;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 1.3rem;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-header h2 .badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 20px;
        }

        .close-sidebar {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            padding: 0;
            margin: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .close-sidebar:hover {
            background: #f0f0f0;
            color: #333;
            transform: none;
            box-shadow: none;
        }

        /* 侧边栏内容 */
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* 打开侧边栏的按钮 - 固定在右侧边缘 */
        .open-sidebar-btn {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            width: 48px;
            height: 80px;
            border-radius: 24px 0 0 24px;
            cursor: pointer;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 20px;
            box-shadow: -2px 4px 12px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-weight: 600;
            letter-spacing: 4px;
        }

        .open-sidebar-btn:hover {
            right: 15px;
            background: linear-gradient(135deg, #5a67d8, #6b46a0);
            width: 52px;
        }

        /* 遮罩层 */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 998;
            display: none;
        }

        .sidebar-overlay.show {
            display: block;
        }

        /* 当侧边栏打开时，给主内容添加右侧内边距效果 */
        body.sidebar-open .content-main {
            margin-right: 0;
        }

        /* 表单元素 */
        textarea, input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
            resize: vertical;
        }

        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 100px;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 12px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #868f96, #596164);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            margin-top: 0;
        }

        .btn-danger {
            background: linear-gradient(135deg, #f56565, #c53030);
        }

        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-weight: 600;
        }

        .loading:after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 8px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* SQL 展示框 */
        .sql-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 14px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-x: auto;
            border-radius: 8px;
            margin: 12px 0;
        }

        /* 结果区域 */
        .result-section {
            margin-top: 20px;
        }

        .result-section h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #555;
        }

        .result-box {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 12px;
            margin-top: 12px;
            overflow-x: auto;
        }

        .error-box {
            background: #fee;
            color: #c00;
            border-left: 4px solid #c00;
        }

        /* 表格样式 */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            border: 1px solid #e0e0e0;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #f5f5f5;
        }

        /* 底部结果区域 */
        .bottom-result {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-top: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .bottom-result h2 {
            margin-top: 0;
            margin-bottom: 16px;
            color: #333;
            font-size: 1.3rem;
        }

        .shared-result-summary {
            background: #e8f0fe;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #667eea;
        }

        /* 跑数查询区域 */
        .sql-query-section {
            margin-bottom: 24px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .ai-sidebar.open {
                width: 100%;
            }
            
            .open-sidebar-btn {
                width: 40px;
                height: 60px;
                font-size: 12px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-header">
            <h1>🤖 自然语言转SQL查询系统</h1>
            <p>用自然语言提问，AI 自动生成 SQL 并执行查询 | 也支持直接编写 SQL 快速跑数</p>
        </div>

        <div class="database-selector">
            <label>📊 选择数据库</label>
            <select id="databaseSelect">
                <option value="">正在加载...</option>
            </select>
            <div class="database-description" id="databaseDescription"></div>
            <div id="kbStatus" class="kb-status" style="display: none;"></div>
            <button id="kbManagementBtn" style="width: 100%; margin-top: 12px; background: #8b5cf6; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 16px; transition: background 0.3s;" onclick="goToKnowledgeManagement()" onmouseover="this.style.background='#7c3aed'" onmouseout="this.style.background='#8b5cf6'">📚 管理知识库</button>
        </div>

        <div class="main-content">
            <!-- 左侧主体内容 -->
            <div class="content-main">
                <div class="sql-query-section">
                    <h2 style="margin-top: 0; margin-bottom: 16px;">📝 跑数查询</h2>
                    <p style="color: #666; margin-bottom: 16px;">直接输入 SQL 查询并执行，适合快速跑数分析。</p>
                    <textarea id="sqlQuery" placeholder="请输入 SQL 查询，例如：SELECT * FROM orders LIMIT 100"></textarea>
                    <button id="executeSqlBtn">▶ 执行 SQL 查询</button>
                    <div class="loading" id="sqlLoadingIndicator">正在执行 SQL</div>
                </div>
            </div>

            <!-- 右侧 AI SQL 侧边栏（像 list 一样从右侧滑出） -->
            <div class="ai-sidebar" id="aiSidebar">
                <div class="sidebar-header">
                    <h2>✨ AI SQL <span class="badge">智能生成</span></h2>
                    <button class="close-sidebar" id="closeSidebar">✕</button>
                </div>
                <div class="sidebar-content">
                    <p style="color: #666; margin-bottom: 16px;">用自然语言提问，AI 会自动生成 SQL 并执行查询。</p>
                    <textarea id="nlQuery" placeholder="请输入您的自然语言查询，例如：查询最近一个月销量最高的10本书"></textarea>
                    <div style="margin: 16px 0;">
                        <label style="font-weight: 600; color: #333; display: block; margin-bottom: 8px;">📋 表选择方式</label>
                        <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom: 12px;">
                            <label style="display:flex; align-items:center; gap:6px;"><input type="radio" name="tableMode" id="tableModeAuto" value="auto" checked> 自动匹配相关表</label>
                            <label style="display:flex; align-items:center; gap:6px;"><input type="radio" name="tableMode" id="tableModeManual" value="manual"> 手动选择单表</label>
                        </div>
                        <input id="tableSearch" placeholder="搜索表..." style="width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 14px; margin-bottom: 12px; display: none;">
                        <select id="tableSelect" disabled style="width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 14px; background: #f8f9fa;">
                            <option value="">请选择表</option>
                        </select>
                    </div>
                    <button id="submitBtn">🤖 AI 生成 SQL 并执行</button>
                    <div class="loading" id="aiLoadingIndicator">AI 正在思考</div>

                    <div class="result-section">
                        <h3>📄 生成的 SQL</h3>
                        <div class="sql-box" id="generatedSQL">等待输入...</div>
                    </div>

                    </div>
                </div>
            </div>

            <!-- 遮罩层 -->
            <div class="sidebar-overlay" id="sidebarOverlay"></div>
        </div>

        <!-- 打开侧边栏的按钮 -->
        <button class="open-sidebar-btn" id="openSidebarBtn">
            AI<br>SQL
        </button>

        <!-- 底部：统一结果展示 -->
        <div class="bottom-result">
            <h2>📊 查询结果</h2>
            <div id="sharedResultSummary" class="shared-result-summary" style="display: none;"></div>
            <div id="sharedResultData"></div>
            <div id="sharedResultError" class="result-box error-box" style="display: none;"></div>
        </div>
    </div>

    <script>
        // 跳转到知识库管理页面
        function goToKnowledgeManagement() {
            window.location.href = '/knowledge-management';
        }

        // 侧边栏控制
        const sidebar = document.getElementById('aiSidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const openBtn = document.getElementById('openSidebarBtn');
        const closeBtn = document.getElementById('closeSidebar');

        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('show');
            document.body.classList.add('sidebar-open');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
            document.body.classList.remove('sidebar-open');
        }

        openBtn.addEventListener('click', openSidebar);
        closeBtn.addEventListener('click', closeSidebar);
        overlay.addEventListener('click', closeSidebar);

        // 按 ESC 关闭侧边栏
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && sidebar.classList.contains('open')) {
                closeSidebar();
            }
        });

        // 页面加载
        window.addEventListener('load', async () => {
            await loadDatabases();
            await loadKbSources();
        });

        // 加载数据库列表
        async function loadDatabases() {
            try {
                const response = await fetch('/get_databases');
                const data = await response.json();
                
                if (response.ok && data.databases) {
                    const select = document.getElementById('databaseSelect');
                    const description = document.getElementById('databaseDescription');
                    
                    select.innerHTML = '';
                    data.databases.forEach(db => {
                        const option = document.createElement('option');
                        option.value = db.id;
                        option.textContent = db.name;
                        select.appendChild(option);
                    });
                    
                    if (data.databases.length > 0) {
                        select.value = data.databases[0].id;
                        description.textContent = data.databases[0].description;
                    }
                    
                    select.addEventListener('change', () => {
                        const selected = data.databases.find(db => db.id === select.value);
                        if (selected) description.textContent = selected.description;
                        loadKbStatus();
                        loadDbTables();
                    });
                    
                    loadKbStatus();
                    loadDbTables();
                }
            } catch (error) {
                console.error('加载数据库失败:', error);
            }
        }

        let kbSupportedIds = new Set();

        async function loadKbSources() {
            try {
                const r = await fetch('/api/knowledge/sources');
                const j = await r.json();
                if (r.ok && j.db_ids) kbSupportedIds = new Set(j.db_ids);
            } catch (_) {}
        }

        async function loadKbStatus() {
            const select = document.getElementById('databaseSelect');
            const box = document.getElementById('kbStatus');
            const db = select?.value;
            if (!db) return;
            
            box.style.display = 'block';
            box.textContent = '正在加载知识库状态...';
            
            try {
                const r = await fetch(`/api/knowledge/status?db_name=${encodeURIComponent(db)}`);
                const j = await r.json();
                if (!r.ok) {
                    box.textContent = j.error || '加载失败';
                    return;
                }
                if (j.unsupported) {
                    box.textContent = j.message || '该数据源无知识库配置';
                    return;
                }
                const lines = [
                    `数据源：${j.db_name}`,
                    `工作表：${j.sheet_name || ''}`,
                    `来源：${j.from_upload ? '已上传覆盖' : '默认配置'}`,
                    j.row_count != null ? `行数：${j.row_count}` : ''
                ].filter(Boolean);
                box.textContent = lines.join('\n');
            } catch (e) {
                box.textContent = '请求失败：' + e.message;
            }
        }

        async function loadDbTables() {
            const select = document.getElementById('databaseSelect');
            const tableSelect = document.getElementById('tableSelect');
            const tableSearch = document.getElementById('tableSearch');
            const manualRadio = document.getElementById('tableModeManual');
            if (!select || !tableSelect) return;

            tableSelect.innerHTML = '<option value="">正在加载表...</option>';
            try {
                const response = await fetch(`/api/db_tables?db_name=${encodeURIComponent(select.value)}`);
                const data = await response.json();
                if (response.ok && Array.isArray(data.tables)) {
                    tableSelect.innerHTML = '<option value="">请选择表</option>';
                    if (data.tables.length == 0) {
                        tableSelect.innerHTML = '<option value="">无可用表</option>';
                    } else {
                        // 保存原始数据
                        window.originalTableOptions = data.tables;
                        // 显示所有选项
                        data.tables.forEach(table => {
                            const option = document.createElement('option');
                            option.value = table.schema ? `${table.schema}.${table.table_name}` : table.table_name;
                            option.textContent = table.schema ? `${table.schema}.${table.table_name}` : table.table_name;
                            tableSelect.appendChild(option);
                        });
                    }
                } else {
                    const errorMsg = data.error || '加载表失败';
                    tableSelect.innerHTML = `<option value="">${errorMsg}</option>`;
                    window.originalTableOptions = [];
                }
            } catch (error) {
                tableSelect.innerHTML = '<option value="">请求失败</option>';
                window.originalTableOptions = [];
            }
            if (manualRadio) {
                tableSelect.disabled = !manualRadio.checked;
                tableSearch.style.display = manualRadio.checked ? 'block' : 'none';
            }
        }

        document.getElementById('tableModeAuto').addEventListener('change', () => {
            const tableSelect = document.getElementById('tableSelect');
            const tableSearch = document.getElementById('tableSearch');
            tableSelect.disabled = true;
            tableSearch.style.display = 'none';
        });

        document.getElementById('tableModeManual').addEventListener('change', () => {
            const tableSelect = document.getElementById('tableSelect');
            const tableSearch = document.getElementById('tableSearch');
            tableSelect.disabled = false;
            tableSearch.style.display = 'block';
        });

        document.getElementById('tableSearch').addEventListener('input', function() {
            const filter = this.value.toLowerCase();
            const tableSelect = document.getElementById('tableSelect');
            tableSelect.innerHTML = '<option value="">请选择表</option>';
            if (window.originalTableOptions) {
                window.originalTableOptions.forEach(table => {
                    const displayName = table.schema ? `${table.schema}.${table.table_name}` : table.table_name;
                    if (displayName.toLowerCase().includes(filter)) {
                        const option = document.createElement('option');
                        option.value = table.schema ? `${table.schema}.${table.table_name}` : table.table_name;
                        option.textContent = displayName;
                        tableSelect.appendChild(option);
                    }
                });
            }
        });

        // 执行 SQL
        document.getElementById('executeSqlBtn').addEventListener('click', async () => {
            const sql = document.getElementById('sqlQuery').value.trim();
            const db = document.getElementById('databaseSelect').value;
            const loading = document.getElementById('sqlLoadingIndicator');
            const resultData = document.getElementById('sharedResultData');
            const resultError = document.getElementById('sharedResultError');
            const resultSummary = document.getElementById('sharedResultSummary');

            if (!sql) { alert('请输入 SQL'); return; }
            if (!db) { alert('请选择数据库'); return; }

            loading.style.display = 'block';
            resultData.innerHTML = '';
            resultError.style.display = 'none';
            resultSummary.style.display = 'none';

            try {
                const response = await fetch('/execute_sql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql, db_name: db })
                });
                const data = await response.json();
                
                if (response.ok) {
                    resultSummary.textContent = `来源：直接 SQL 查询（${db}）`;
                    resultSummary.style.display = 'block';
                    if (data.sql_result?.length > 0) {
                        const columns = Object.keys(data.sql_result[0]);
                        resultData.innerHTML = createTable(data.sql_result, columns);
                    } else {
                        resultData.textContent = '查询成功，但未返回数据';
                    }
                } else {
                    resultError.textContent = data.error || '执行失败';
                    resultError.style.display = 'block';
                }
            } catch (error) {
                resultError.textContent = '请求出错: ' + error.message;
                resultError.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        });

        // AI 查询
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const query = document.getElementById('nlQuery').value.trim();
            const db = document.getElementById('databaseSelect').value;
            const loading = document.getElementById('aiLoadingIndicator');
            const generatedSQL = document.getElementById('generatedSQL');
            const resultData = document.getElementById('sharedResultData');
            const resultError = document.getElementById('sharedResultError');
            const resultSummary = document.getElementById('sharedResultSummary');
            const manualMode = document.getElementById('tableModeManual').checked;
            const selectedTable = manualMode ? document.getElementById('tableSelect').value : null;

            if (!query) { alert('请输入查询内容'); return; }
            if (!db) { alert('请选择数据库'); return; }
            if (manualMode && !selectedTable) { alert('请选择具体表'); return; }

            loading.style.display = 'block';
            generatedSQL.textContent = '生成中...';
            resultData.innerHTML = '';
            resultError.style.display = 'none';
            resultSummary.style.display = 'none';

            try {
                const response = await fetch('/execute_nl_query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nl_query: query,
                        db_name: db,
                        selected_table: selectedTable,
                        use_vector_search: !manualMode
                    })
                });
                const data = await response.json();
                
                if (response.ok) {
                    generatedSQL.textContent = data.generated_sql || '未生成 SQL';
                    const modeText = manualMode ? `手动表 ${selectedTable}` : '智能匹配相关表';
                    resultSummary.textContent = `来源：AI 生成 SQL（${db}，${modeText}）`;
                    resultSummary.style.display = 'block';
                    if (data.sql_result?.length > 0) {
                        const columns = Object.keys(data.sql_result[0]);
                        resultData.innerHTML = createTable(data.sql_result, columns);
                    } else {
                        resultData.textContent = '查询成功，但未返回数据';
                    }
                } else {
                    generatedSQL.textContent = '生成失败';
                    resultError.textContent = data.error || '请求失败';
                    resultError.style.display = 'block';
                }
            } catch (error) {
                generatedSQL.textContent = '请求出错';
                resultError.textContent = '请求出错: ' + error.message;
                resultError.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        });

        function createTable(data, columns) {
            let html = '<table><thead><tr>';
            columns.forEach(col => html += `<th>${escapeHtml(col)}</th>`);
            html += '</tr></thead><tbody>';
            data.forEach(row => {
                html += '<tr>';
                columns.forEach(col => {
                    let val = row[col];
                    if (val === null || val === undefined) val = 'NULL';
                    html += `<td>${escapeHtml(String(val))}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            return html;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }


        // 页面加载
        window.addEventListener('load', async () => {
            await loadDatabases();
            await loadKbSources();
        });
    </script>
</body>
</html>
